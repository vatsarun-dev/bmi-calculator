<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMI Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="card" id="bmiCard">
      <h1>BMI Calculator</h1>
      <p class="subtitle">Track your Body Mass Index instantly</p>

      <div class="unit-switch" role="group" aria-label="Unit selector">
        <button type="button" class="unit-btn active" id="metricBtn">cm / kg</button>
        <button type="button" class="unit-btn" id="imperialBtn">ft / lbs</button>
      </div>

      <form id="bmiForm" novalidate>
        <div class="field-row">
          <label for="personName">Name (optional)</label>
          <input type="text" id="personName" placeholder="e.g., Arun" maxlength="40">
        </div>

        <div class="field-row" id="metricHeightWrap">
          <label for="heightCm">Height (cm)</label>
          <input type="number" id="heightCm" min="1" step="0.1" placeholder="170">
        </div>

        <div class="field-row hidden" id="imperialHeightWrap">
          <label>Height (feet + inches)</label>
          <div class="split-inputs">
            <input type="number" id="heightFt" min="0" step="1" placeholder="5">
            <input type="number" id="heightIn" min="0" step="0.1" placeholder="9">
          </div>
        </div>

        <div class="field-row" id="metricWeightWrap">
          <label for="weightKg">Weight (kg)</label>
          <input type="number" id="weightKg" min="1" step="0.1" placeholder="70">
        </div>

        <div class="field-row hidden" id="imperialWeightWrap">
          <label for="weightLbs">Weight (lbs)</label>
          <input type="number" id="weightLbs" min="1" step="0.1" placeholder="154">
        </div>

        <p id="errorMsg" class="error" aria-live="polite"></p>

        <div class="actions">
          <button type="submit" class="primary">Calculate BMI</button>
          <button type="button" id="resetBtn" class="secondary">Reset</button>
        </div>
      </form>

      <section class="result" id="resultBox" aria-live="polite">
        <h2>Your Result</h2>
        <p class="bmi-value" id="bmiValue">--</p>
        <p class="bmi-category" id="bmiCategory">Enter details to calculate</p>
      </section>

      <section class="category-table">
        <h3>BMI Categories</h3>
        <ul>
          <li><span>Below 18.5</span><strong>Underweight</strong></li>
          <li><span>18.5 - 24.9</span><strong>Normal weight</strong></li>
          <li><span>25 - 29.9</span><strong>Overweight</strong></li>
          <li><span>30 and above</span><strong>Obese</strong></li>
        </ul>
      </section>

      <section class="history">
        <h3>Previous Results</h3>
        <ul id="historyList"></ul>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
